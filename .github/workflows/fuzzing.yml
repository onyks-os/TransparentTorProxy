name: Dynamic Analysis (Fuzzing)

on:
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'   # Weekly: every Sunday at midnight UTC

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run Hypothesis fuzz tests
      run: |
        pytest fuzzing/fuzz_target.py -v

  success-check:
    name: Dynamic Analysis Gate
    runs-on: ubuntu-latest
    needs: fuzz
    if: always()
    steps:
    - name: Check for fuzzing failures
      run: |
        if [ "${{ needs.fuzz.result }}" != "success" ]; then
          echo "Fuzzing job failed. Please check the logs."
          exit 1
        else
          echo "Dynamic analysis passed successfully!"
        fi
