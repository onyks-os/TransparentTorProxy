name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required to create/update the GitHub Release and upload assets
  id-token: write   # Required for Sigstore keyless OIDC authentication

jobs:
  release:
    name: Build, Sign, and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build release packages
        run: make build

      - name: Generate SBOM
        run: |
          npm install -g @cyclonedx/cdxgen
          cdxgen -o packaging/sbom.json

      - name: Sign packages with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.0.0
        with:
          inputs: |
            packaging/*.deb
            packaging/*.rpm
            packaging/*.whl
            packaging/*.tar.gz
            packaging/SHA256SUMS.txt
            packaging/sbom.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/*.deb
            packaging/*.rpm
            packaging/*.whl
            packaging/*.tar.gz
            packaging/SHA256SUMS.txt
            packaging/*.sigstore
            packaging/sbom.json
          generate_release_notes: true
